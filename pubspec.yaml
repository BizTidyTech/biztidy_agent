name: biztidy_agent_app
description: "BizTidy Agent App - For cleaning service agents."
publish_to: 'none'

version: 1.0.3+76

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  logger: ^2.5.0
  async: ^2.11.0
  get: ^4.6.6
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  go_router: ^14.6.0
  image_picker: ^1.1.2
  video_player: ^2.9.2
  url_launcher: ^6.2.5
  fluttertoast: ^8.2.8
  intl: ^0.19.0
  onesignal_flutter: ^5.2.8
  http: ^1.2.2
  cached_network_image: ^3.4.1
  geolocator: ^13.0.3
  animate_gradient: ^0.0.3
  cupertino_will_pop_scope: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.1"
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/agent_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Audiowide
      fonts:
        - asset: fonts/Audiowide-Regular.ttf
    - family: OpenSans
      fonts:
        - asset: fonts/OpenSans-VariableFont_wdth,wght.ttf
    - family: Alice
      fonts:
        - asset: fonts/Alice-Regular.ttf
    - family: Inter
      fonts:
        - asset: fonts/Inter-VariableFont_opsz,wght.ttf
